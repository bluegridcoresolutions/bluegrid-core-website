name: Build & Check (PR)

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches-ignore: [ main, master ]

permissions:
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run ESLint
        run: npm run lint || true

      - name: 🔍 Type check
        run: npm run type-check || true

      - name: 🔐 Audit dependencies (high severity)
        run: npm audit --audit-level=high || true

      - name: 📊 Build with bundle analysis
        run: npm run build:analyze || npm run build

      - name: 📤 Upload bundle analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis-pr-${{ github.event.number }}
          path: dist/stats.html

      - name: 🏗️ Build project (production)
        run: npm run build

      - name: 📤 Upload build artifact (for review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-pr-${{ github.event.number }}
          path: dist

      - name: 🚨 Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('❌ Build or checks failed. Check the logs.')
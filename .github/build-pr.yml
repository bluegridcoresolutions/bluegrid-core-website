name: Build & Check (PR)

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches-ignore: [ main, master ]

permissions:
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - run: pnpm install
      - run: pnpm run lint || true
      - run: pnpm run type-check || true
      - run: pnpm audit --audit-level=high || true
      - run: pnpm run build:analyze || pnpm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-analysis-pr-${{ github.event.number }}
          path: dist/stats.html
      - run: pnpm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-pr-${{ github.event.number }}
          path: dist
